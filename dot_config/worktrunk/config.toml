[commit.generation]
command = "MAX_THINKING_TOKENS=0 claude -p --no-session-persistence --model=haiku --tools='' --disable-slash-commands --setting-sources='' --system-prompt=''"
template = """
Write a commit message for this diff. One line, under 50 chars. Use conventional commit format. Only output the commit message.

Branch: {{ branch }}
Diff:
{{ git_diff }}
"""

[post-switch]
rename = "[ -n \"$TMUX\" ] && tmux rename-window {{ branch | sanitize }}"
setpath = "[ -n \"$TMUX\" ] && tmux set-option -w @worktree_path '{{ worktree_path }}'"
