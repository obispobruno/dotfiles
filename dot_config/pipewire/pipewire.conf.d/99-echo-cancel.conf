# Echo cancellation: removes desktop audio (YouTube, games, music) from the mic.
# Uses WebRTC AEC with the monitor of the Logi Z407 as the echo reference,
# so ALL audio played through the speakers is cancelled - no virtual sink needed.
# Select "Echo-Cancelled Microphone" as the input device in Discord.

context.modules = [
    {   name = libpipewire-module-echo-cancel
        args = {
            library.name = aec/libspa-aec-webrtc

            # Capture the echo reference from the monitor of the real output
            # instead of creating a virtual speaker.
            monitor.mode = true

            capture.props = {
                # Real microphone (Razer Seiren Mini)
                node.target = "alsa_input.usb-Razer_Inc_Razer_Seiren_Mini_UC2136L03306453-00.mono-fallback"
                node.passive = true
            }

            source.props = {
                node.name = "echo-cancel-source"
                node.description = "Echo-Cancelled Microphone"
            }

            playback.props = {
                # Echo reference: monitor of the Logi Z407 output
                node.target = "alsa_output.usb-Logitech_Logi_Z407_00000000-01.pro-output-0"
                node.passive = true
            }
        }
    }
]
